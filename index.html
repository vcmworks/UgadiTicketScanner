<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAB Bremen | Ugadi 2026 Portal</title>
    <style>
        :root { --p-green: #27ae60; --d-green: #1e8449; --saffron: #f1c40f; --cream: #FFFDD0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--cream); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .hub-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border-top: 10px solid var(--p-green); max-width: 400px; width: 90%; }
        h1 { color: var(--d-green); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-btn { display: block; width: 100%; padding: 15px; margin: 15px 0; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-decoration: none; box-sizing: border-box; }
        .gen-btn { background: var(--p-green); color: var(--saffron); }
        .scan-btn { background: var(--d-green); color: white; border: 2px solid var(--saffron); }
        .nav-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="hub-card">
        <img src="tablogo.jpg" alt="TAB Logo" style="height: 60px; margin-bottom: 10px;">
        <h1>Ugadi 2026</h1>
        <a href="generator.html" class="nav-btn gen-btn">🎟️ TICKET GENERATOR</a>
        <a href="scanner.html" class="nav-btn scan-btn">🔍 ENTRY SCANNER</a>
        <p style="font-size: 12px; color: #666; margin-top: 20px;">TAB Bremen Event Management System</p>
    </div>
</body>
</html>
