<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAB Entry Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p-green: #27ae60; --d-green: #1e8449; --saffron: #f1c40f; --cream: #FFFDD0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--cream); text-align: center; padding: 20px; margin: 0; }
        .card { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--p-green); }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 3px solid var(--p-green); background: #000; min-height: 300px; }
        .res-box { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; text-align: left; animation: fadeIn 0.3s; }
        .valid { background: #e8f5e9; border: 2px solid #27ae60; color: #1b5e20; }
        .invalid { background: #ffebee; border: 2px solid #d32f2f; color: #b71c1c; }
        .already { background: #fffde7; border: 2px solid #fbc02d; color: #f57f17; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: rgba(255,255,255,0.7); padding: 8px; border-radius: 8px; text-align: center; font-size: 13px; font-weight: bold; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        .btn-confirm { background: var(--d-green); color: var(--saffron); }
        .btn-next { background: #eee; color: #333; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: var(--d-green); margin-top:0;">TAB ENTRY SCANNER</h2>
    <div id="status-text" style="margin-bottom:10px; font-weight:bold; color:#666;">Ready to Scan</div>
    <div id="reader"></div>
    <div id="result" class="res-box"></div>
</div>

<script>
    // PASTE YOUR DEPLOYED WEB APP URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1wCoUthoMfTg5pFJg1H_3zwsCjS8MNaLeG4Inzrn32WshT6Tsap6Dh6gKKbTfp9Y/exec";

    let html5QrScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrScanner.render(onScanSuccess);

    async function onScanSuccess(decodedText) {
        // Extract KeyID from QR (Handles VALID|ID|NAME format)
        const keyID = decodedText.includes('|') ? decodedText.split('|')[1] : decodedText;
        
        document.getElementById('status-text').innerText = "Verifying Guest...";
        html5QrScanner.pause();

        try {
            const response = await fetch(`${SCRIPT_URL}?action=checkGuest&keyID=${keyID}`);
            const guest = await response.json();

            if (guest.error) {
                showUI("invalid", `<h2>NOT FOUND</h2><p>ID <b>${keyID}</b> is not in the system.</p><button class="btn btn-next" onclick="reset()">Next Scan</button>`);
            } else if (guest.status === "Checked") {
                showUI("already", `<h2>ALREADY IN</h2><h3>${guest.name}</h3><p>Guest is already inside.</p><button class="btn btn-next" onclick="reset()">Next Scan</button>`);
            } else {
                let paid = guest.payment.toLowerCase() === "paid";
                showUI("valid", `
                    <h2 style="margin:0">${guest.name}</h2>
                    <div class="stats-grid">
                        <div class="stat-item">Adults<br>${guest.adults}</div>
                        <div class="stat-item">Students<br>${guest.students}</div>
                        <div class="stat-item">Kids<br>${guest.kids}</div>
                    </div>
                    <p>Payment Status: <b style="color:${paid?'green':'red'}">${guest.payment.toUpperCase()}</b></p>
                    ${paid ? 
                        `<button id="ci-btn" class="btn btn-confirm" onclick="confirmIn('${keyID}')">CONFIRM ENTRY</button>` : 
                        `<p style="color:red; font-weight:bold;">⚠️ BLOCKED: PAYMENT REQUIRED</p><button class="btn btn-next" onclick="reset()">Next</button>`
                    }
                `);
            }
        } catch (err) {
            showUI("invalid", "<h2>CONNECTION ERROR</h2><p>Could not reach Google Sheets.</p>");
        }
    }

    async function confirmIn(id) {
        document.getElementById('ci-btn').innerText = "Processing...";
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: `action=checkIn&keyID=${id}` });
        showUI("valid", "<h2>✅ SUCCESS</h2><p>Guest marked as Checked.</p><button class="btn btn-next" onclick="reset()">Next Scan</button>");
    }

    function showUI(type, html) {
        const res = document.getElementById('result');
        res.style.display = "block";
        res.className = "res-box " + type;
        res.innerHTML = html;
        document.getElementById('status-text').innerText = "Result Found";
    }

    function reset() {
        document.getElementById('result').style.display = "none";
        document.getElementById('status-text').innerText = "Ready to Scan";
        html5QrScanner.resume();
    }
</script>
</body>
</html>
